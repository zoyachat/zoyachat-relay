server {
    listen 443 ssl;
    server_name relay.zoyachat.example;

    ssl_certificate /etc/letsencrypt/live/relay.zoyachat.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.zoyachat.example/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://127.0.0.1:9091/health;
    }
}
